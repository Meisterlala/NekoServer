apiVersion: apps/v1
kind: Deployment
metadata:
  name: neko-server
  namespace: {{ .Values.namespace | quote }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neko-server
  template:
    metadata:
      labels:
        app: neko-server
    spec:
      containers:
        - name: neko-server
          image: "{{ .Values.image.image }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          command:
            - neko_server
          ports:
            - name: http
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          env:
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: nekoserver-config
                  key: RUST_LOG
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-url
            - name: GALLERY_DL_WORKER_URL
              value: "http://127.0.0.1:8090/query"
            - name: GALLERY_DL_CACHE_TTL_SECONDS
              value: {{ .Values.galleryDl.cacheTtlSeconds | quote }}
          resources:
            limits:
              memory: {{ .Values.resources.limits.memory | quote }}
              cpu: {{ .Values.resources.limits.cpu | quote }}
            requests:
              memory: {{ .Values.resources.requests.memory | quote }}
              cpu: {{ .Values.resources.requests.cpu | quote }}
        - name: gallery-dl-worker
          image: "{{ .Values.galleryDlWorker.image }}:{{ .Values.galleryDlWorker.tag }}"
          imagePullPolicy: {{ .Values.galleryDlWorker.pullPolicy | quote }}
          env:
            - name: MAX_CONCURRENT_JOBS
              value: {{ .Values.galleryDlWorker.maxConcurrentJobs | quote }}
          ports:
            - name: gallery-worker
              containerPort: 8090
          resources:
            limits:
              memory: 256Mi
              cpu: 500m
            requests:
              memory: 50Mi
              cpu: 50m
